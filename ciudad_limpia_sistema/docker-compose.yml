version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ciudad-limpia-app
    container_name: ciudad_limpia_app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www/html
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
    networks:
      - app-network
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: ciudad_limpia_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-ciudad_limpia}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5434:5432" # Changed host port from 5432 to 5433
    volumes:
      - dbdata:/var/lib/postgresql/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
